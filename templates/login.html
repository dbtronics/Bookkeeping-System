<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookkeeping — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('bk-theme')||'light'); })();</script>
</head>
<body class="login-page">
  <div class="login-box">
    <img id="loginLogo"
         src="{{ url_for('static', filename='img/logo-light.png') }}"
         alt="DBtronics Bookkeeping"
         class="login-logo">
    <script>
      (function(){
        var t = localStorage.getItem('bk-theme') || 'light';
        var src = t === 'dark'
          ? "{{ url_for('static', filename='img/logo-dark.png') }}"
          : "{{ url_for('static', filename='img/logo-light.png') }}";
        document.getElementById('loginLogo').src = src;
      })();
    </script>
    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Password" autofocus required autocorrect="off" autocapitalize="none" spellcheck="false">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
